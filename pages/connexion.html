<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Sooky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .auth-page {
      min-height: calc(100vh - var(--nav-height));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      position: relative;
      overflow: hidden;
    }

    .auth-page::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: var(--gradient-primary);
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      animation: float 15s ease-in-out infinite;
    }

    .auth-page::after {
      content: '';
      position: absolute;
      bottom: -50%;
      left: -20%;
      width: 500px;
      height: 500px;
      background: var(--gradient-accent);
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      animation: float 20s ease-in-out infinite reverse;
    }

    .auth-container {
      max-width: 480px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 48px;
      box-shadow: var(--shadow-xl);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .auth-header h1 {
      font-family: 'Fraunces', serif;
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 12px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-header p {
      color: var(--text-secondary);
      font-size: 15px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .form-input {
      width: 100%;
      padding: 14px 20px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s ease;
      background: white;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
      transform: translateY(-2px);
    }

    .form-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 20px 0;
    }

    .form-checkbox input {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .form-checkbox label {
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      margin-top: 8px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 32px 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .social-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .social-btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid var(--border);
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-primary);
    }

    .social-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: var(--primary);
    }

    .auth-footer {
      text-align: center;
      margin-top: 32px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .auth-footer a:hover {
      color: var(--primary-dark);
    }

    .forgot-password {
      text-align: right;
      margin-top: 8px;
    }

    .forgot-password a {
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .forgot-password a:hover {
      color: var(--primary-dark);
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
      background: var(--bg-secondary);
      padding: 6px;
      border-radius: 12px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: transparent;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .tab.active {
      background: white;
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }
  </style>
</head>
<body>

  <!-- NAVIGATION -->
  <nav>
    <div class="container">
      <div class="nav-inner">
        <a href="../index.html" class="logo">sooky</a>
        
        <div class="search-bar">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.3-4.3"/>
          </svg>
          <input type="text" placeholder="Rechercher des produits, boutiques...">
        </div>
        
        <div class="nav-links">
          <a href="boutiques.html">Boutiques</a>
          <a href="connexion.html">Connexion</a>
          <a href="panier.html">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="9" cy="21" r="1"/>
              <circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
          </a>
          <a href="vendre.html" class="btn btn-primary">Vendre sur Sooky</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- AUTH PAGE -->
  <section class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>Bienvenue sur Sooky</h1>
          <p>Connecte-toi pour continuer tes achats</p>
        </div>

        <!-- TABS -->
        <div class="tabs">
          <button class="tab active" onclick="switchTab('login')">Connexion</button>
          <button class="tab" onclick="switchTab('register')">Inscription</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="login-tab" class="tab-content active">
          <form>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" class="form-input" placeholder="ton@email.com" required>
            </div>

            <div class="form-group">
              <label for="password">Mot de passe</label>
              <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>

            <div class="form-checkbox">
              <input type="checkbox" id="remember">
              <label for="remember">Se souvenir de moi</label>
            </div>

            <div class="forgot-password">
              <a href="#">Mot de passe oublié ?</a>
            </div>

            <button type="submit" class="btn btn-primary submit-btn">
              Se connecter →
            </button>
          </form>

          <div class="divider">ou continuer avec</div>

          <div class="social-buttons">
            <button class="social-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              Google
            </button>

            <button class="social-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
              </svg>
              Facebook
            </button>
          </div>
        </div>

        <!-- REGISTER FORM -->
        <div id="register-tab" class="tab-content">
          <form>
            <div class="form-group">
              <label for="name">Nom complet</label>
              <input type="text" id="name" class="form-input" placeholder="Ahmed Bennani" required>
            </div>

            <div class="form-group">
              <label for="email-register">Email</label>
              <input type="email" id="email-register" class="form-input" placeholder="ton@email.com" required>
            </div>

            <div class="form-group">
              <label for="phone">Téléphone</label>
              <input type="tel" id="phone" class="form-input" placeholder="+212 6XX XXX XXX" required>
            </div>

            <div class="form-group">
              <label for="password-register">Mot de passe</label>
              <input type="password" id="password-register" class="form-input" placeholder="••••••••" required>
            </div>

            <div class="form-checkbox">
              <input type="checkbox" id="terms" required>
              <label for="terms">J'accepte les <a href="#" style="color: var(--primary);">conditions d'utilisation</a></label>
            </div>

            <button type="submit" class="btn btn-primary submit-btn">
              Créer mon compte →
            </button>
          </form>

          <div class="divider">ou continuer avec</div>

          <div class="social-buttons">
            <button class="social-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
              Google
            </button>

            <button class="social-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
              </svg>
              Facebook
            </button>
          </div>
        </div>

        <div class="auth-footer">
          <p>En continuant, tu acceptes nos <a href="#">Conditions d'utilisation</a> et notre <a href="#">Politique de confidentialité</a></p>
        </div>
      </div>
    </div>
  </section>

  <script>
    function switchTab(tab) {
      // Update tabs
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      if (tab === 'login') {
        document.querySelectorAll('.tab')[0].classList.add('active');
        document.getElementById('login-tab').classList.add('active');
      } else {
        document.querySelectorAll('.tab')[1].classList.add('active');
        document.getElementById('register-tab').classList.add('active');
      }
    }
  </script>
</body>
</html>
